<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <link rel="stylesheet" href="styles/style.css">
    <script src="scripts/app.js" defer></script>
    <title>Document</title>
</head>
<body>
<div class="toolbar">
    <input type="file" id="load-json" accept=".json" />
    <button id="save-json">Išsaugoti (Сохранить JSON)</button>
</div>

<div class="kanban-board" id="board">

    <div class="column">
        <h3>Dalyviai (Участники)</h3>
        <div class="list" id="list-participants">
            <div class="student-card" data-id="1">
                <div class="card-header">
                    <span class="name">Jonas</span>
                    <input type="color" class="status-color" value="#cccccc" title="Цвет статуса">
                </div>
                <input type="text" class="note-input" placeholder="Pastaba (Заметка)...">
            </div>
        </div>
    </div>

    <div class="move-controls">
        <button id="move-to-answering">➡</button>
    </div>

    <div class="column">
        <h3>Atsakinėja (Отвечают)</h3>
        <div class="list" id="list-answering"></div>
    </div>

    <div class="move-controls">
        <button id="move-to-answered">➡</button>
    </div>

    <div class="column">
        <div class="header-with-btn">
            <h3>Atsakė (Ответили)</h3>
            <button id="reset-all" class="reset-btn">Išvalyti (Сброс)</button>
        </div>
        <div class="list" id="list-answered"></div>
    </div>

</div>
</body>
</html>
